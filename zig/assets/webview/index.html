<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; script-src 'self' 'unsafe-inline' file:; style-src 'self' 'unsafe-inline' file:; img-src 'self' data: file:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pi WebView</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #101216;
        color: #f2f5f8;
      }
      main {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        min-height: 100vh;
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
        gap: 16px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p,
      pre {
        margin: 0;
        line-height: 1.5;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #status,
      #initial-input,
      .panel {
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
      }
      .panels {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
      }
      .panel {
        display: grid;
        gap: 10px;
        min-width: 0;
      }
      .panel h2 {
        margin: 0;
        font-size: 15px;
      }
      .panel-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .panel input,
      .panel select {
        min-width: 0;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        padding: 6px 8px;
      }
      .panel-list {
        display: grid;
        gap: 8px;
        max-height: 220px;
        overflow: auto;
      }
      .panel-row {
        display: grid;
        gap: 4px;
        text-align: left;
        padding: 8px 10px;
        height: auto;
      }
      .panel-row.current {
        border-color: rgba(63, 185, 80, 0.75);
      }
      .panel-row.disabled,
      .panel-row:disabled {
        opacity: 0.58;
      }
      .settings-row,
      .scoped-row {
        grid-template-columns: 1fr auto;
        align-items: start;
      }
      .settings-row .meta,
      .scoped-row .meta {
        grid-column: 1 / -1;
      }
      .theme-swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: currentColor;
      }
      .panel-row .meta,
      .panel-status {
        color: #c9d1d9;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .auth-required {
        border-color: rgba(255, 171, 0, 0.7);
        background: rgba(255, 171, 0, 0.12);
      }
      #messages {
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 4px;
      }
      .message,
      .event {
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        white-space: pre-wrap;
      }
      .message.user {
        background: rgba(88, 166, 255, 0.16);
      }
      .message.assistant {
        background: rgba(63, 185, 80, 0.14);
      }
      .message.assistant.streaming {
        border-color: rgba(63, 185, 80, 0.48);
        box-shadow: 0 0 0 1px rgba(63, 185, 80, 0.12);
      }
      .message.assistant.streaming strong::after {
        content: " streaming";
        color: #7ee787;
        font-size: 12px;
        font-weight: 500;
      }
      .event {
        color: #c9d1d9;
        font-size: 13px;
      }
      .structured-card {
        display: grid;
        gap: 8px;
        border-left: 4px solid rgba(201, 209, 217, 0.35);
      }
      .structured-card .card-title {
        display: flex;
        gap: 8px;
        align-items: baseline;
        font-weight: 700;
      }
      .structured-card .card-kind {
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 11px;
        opacity: 0.8;
      }
      .structured-card pre,
      .structured-card code {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .thinking-card {
        background: rgba(187, 128, 255, 0.12);
        border-left-color: rgba(187, 128, 255, 0.75);
      }
      .thinking-card details:not([open]) .thinking-body {
        display: none;
      }
      .thinking-card summary {
        cursor: pointer;
        font-weight: 700;
      }
      .tool-call-card {
        background: rgba(255, 171, 0, 0.12);
        border-left-color: rgba(255, 171, 0, 0.75);
      }
      .tool-result-card {
        background: rgba(63, 185, 80, 0.1);
        border-left-color: rgba(63, 185, 80, 0.75);
      }
      .tool-result-card.error,
      .terminal-card.error,
      .error-card {
        background: rgba(248, 81, 73, 0.12);
        border-left-color: rgba(248, 81, 73, 0.8);
      }
      .terminal-card.abort {
        background: rgba(255, 171, 0, 0.12);
        border-left-color: rgba(255, 171, 0, 0.75);
      }
      form {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
      }
      textarea,
      button {
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        font: inherit;
      }
      textarea {
        min-height: 58px;
        padding: 10px;
        resize: vertical;
      }
      button {
        padding: 0 16px;
      }
      button:disabled,
      textarea:disabled {
        opacity: 0.55;
      }
      form[data-running="true"] #abort-button {
        border-color: rgba(248, 81, 73, 0.7);
        background: rgba(248, 81, 73, 0.18);
      }
      @media (max-width: 900px) {
        .panels {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>pi WebView</h1>
      <p id="status"><code>bridge: initializing</code></p>
      <section class="panels" aria-label="WebView panels">
        <section id="model-panel" class="panel" aria-label="Model selector">
          <h2>Model selector</h2>
          <div class="panel-status" id="model-panel-status">Loading models…</div>
          <div class="panel-list" id="model-list"></div>
        </section>
        <section id="auth-panel" class="panel" aria-label="Auth panel">
          <h2>Auth</h2>
          <div class="panel-status" id="auth-panel-status">Loading auth…</div>
          <div class="panel-controls">
            <button id="auth-start-button" type="button">Login</button>
            <input id="auth-api-key-input" type="password" placeholder="API key" autocomplete="off" />
            <button id="auth-save-button" type="button">Save key</button>
            <button id="auth-remove-button" type="button">Remove</button>
          </div>
        </section>
        <section id="session-panel" class="panel" aria-label="Session selector">
          <h2>Session selector</h2>
          <div class="panel-controls">
            <select id="session-scope-select" aria-label="Session scope">
              <option value="current">Current</option>
              <option value="all">All</option>
            </select>
            <select id="session-sort-select" aria-label="Session sort">
              <option value="threaded">Threaded</option>
              <option value="recent">Recent</option>
              <option value="relevance">Relevance</option>
            </select>
            <select id="session-name-filter-select" aria-label="Named filter">
              <option value="all">All</option>
              <option value="named">Named</option>
            </select>
            <label><input id="session-path-toggle" type="checkbox" /> paths</label>
            <button id="session-new-button" type="button">New</button>
          </div>
          <input id="session-search-input" placeholder="Search sessions" autocomplete="off" />
          <div class="panel-list" id="session-list"></div>
        </section>
        <section id="settings-panel" class="panel" aria-label="Settings panel">
          <h2>Settings</h2>
          <input id="settings-search-input" placeholder="Search settings" autocomplete="off" />
          <div class="panel-status" id="settings-panel-status">Loading settings…</div>
          <div class="panel-list" id="settings-list"></div>
        </section>
        <section id="thinking-panel" class="panel" aria-label="Thinking level selector">
          <h2>Thinking level</h2>
          <div class="panel-status" id="thinking-panel-status">Loading thinking levels…</div>
          <div class="panel-list" id="thinking-list"></div>
        </section>
        <section id="theme-panel" class="panel" aria-label="Theme selector">
          <h2>Theme</h2>
          <div class="panel-status" id="theme-panel-status">Loading themes…</div>
          <div class="panel-list" id="theme-list"></div>
        </section>
        <section id="scoped-models-panel" class="panel" aria-label="Scoped models panel">
          <h2>Scoped models</h2>
          <div class="panel-controls">
            <input id="scoped-search-input" placeholder="Search scoped models" autocomplete="off" />
            <button id="scoped-enable-all-button" type="button">Enable all</button>
            <button id="scoped-clear-all-button" type="button">Clear</button>
            <button id="scoped-save-button" type="button">Save</button>
          </div>
          <div class="panel-status" id="scoped-panel-status">Loading scoped models…</div>
          <div class="panel-list" id="scoped-list"></div>
        </section>
      </section>
      <pre id="initial-input" hidden></pre>
      <section id="messages" aria-live="polite"></section>
      <form id="prompt-form">
        <textarea id="prompt-input" name="prompt" placeholder="Ask pi…" autocomplete="off"></textarea>
        <button id="submit-button" type="submit">Send</button>
        <button id="abort-button" type="button" disabled>Abort</button>
      </form>
    </main>
    <script>
      const nativeBootstrap = window.__PI_WEBVIEW_NATIVE_BOOTSTRAP__ || {};
      const telemetry = {
        launchPerfMs: performance.now(),
        readyPerfMs: null,
        hydratedPerfMs: null,
        provider: "unknown",
        apiKeyPresent: false,
        inputFocusSent: false,
        typedInputSent: false,
        autoSubmitSent: false,
      };
      window.piWebViewReady = false;
      const state = {
        requestId: 0,
        pending: new Map(),
        activeTurnId: null,
        lastSequenceByTurn: new Map(),
        submitPerfByTurn: new Map(),
        firstDeltaSeenByTurn: new Set(),
        locallyAbortedTurns: new Set(),
        liveAssistantByTurn: new Map(),
        thinkingByTurn: new Map(),
        toolCallByTurn: new Map(),
        bridgeState: null,
        sessionUi: {
          scope: "current",
          sort: "threaded",
          nameFilter: "all",
          showPath: false,
          search: "",
        },
        settingsUi: {
          search: "",
        },
        scopedUi: {
          search: "",
        },
        statusBaseText: "bridge: initializing",
        promptEnabled: true,
        activeFrameMonitor: null,
      };
      const statusEl = document.getElementById("status");
      const messagesEl = document.getElementById("messages");
      const initialInputEl = document.getElementById("initial-input");
      const formEl = document.getElementById("prompt-form");
      const promptInputEl = document.getElementById("prompt-input");
      const submitButtonEl = document.getElementById("submit-button");
      const abortButtonEl = document.getElementById("abort-button");
      const modelPanelStatusEl = document.getElementById("model-panel-status");
      const modelListEl = document.getElementById("model-list");
      const authPanelStatusEl = document.getElementById("auth-panel-status");
      const authStartButtonEl = document.getElementById("auth-start-button");
      const authApiKeyInputEl = document.getElementById("auth-api-key-input");
      const authSaveButtonEl = document.getElementById("auth-save-button");
      const authRemoveButtonEl = document.getElementById("auth-remove-button");
      const sessionScopeSelectEl = document.getElementById("session-scope-select");
      const sessionSortSelectEl = document.getElementById("session-sort-select");
      const sessionNameFilterSelectEl = document.getElementById("session-name-filter-select");
      const sessionPathToggleEl = document.getElementById("session-path-toggle");
      const sessionSearchInputEl = document.getElementById("session-search-input");
      const sessionNewButtonEl = document.getElementById("session-new-button");
      const sessionListEl = document.getElementById("session-list");
      const settingsSearchInputEl = document.getElementById("settings-search-input");
      const settingsPanelStatusEl = document.getElementById("settings-panel-status");
      const settingsListEl = document.getElementById("settings-list");
      const thinkingPanelStatusEl = document.getElementById("thinking-panel-status");
      const thinkingListEl = document.getElementById("thinking-list");
      const themePanelStatusEl = document.getElementById("theme-panel-status");
      const themeListEl = document.getElementById("theme-list");
      const scopedSearchInputEl = document.getElementById("scoped-search-input");
      const scopedEnableAllButtonEl = document.getElementById("scoped-enable-all-button");
      const scopedClearAllButtonEl = document.getElementById("scoped-clear-all-button");
      const scopedSaveButtonEl = document.getElementById("scoped-save-button");
      const scopedPanelStatusEl = document.getElementById("scoped-panel-status");
      const scopedListEl = document.getElementById("scoped-list");

      function postNativeMessage(message) {
        if (window.webkit?.messageHandlers?.pi) {
          window.webkit.messageHandlers.pi.postMessage(message);
        }
      }

      function markTelemetry(name, details = {}) {
        const perfMs = performance.now();
        postNativeMessage({
          type: "telemetry_mark",
          name,
          perfMs,
          wallMs: Date.now(),
          sinceLaunchMs: perfMs - telemetry.launchPerfMs,
          sinceReadyMs: telemetry.readyPerfMs === null ? null : perfMs - telemetry.readyPerfMs,
          sinceHydratedMs: telemetry.hydratedPerfMs === null ? null : perfMs - telemetry.hydratedPerfMs,
          provider: telemetry.provider,
          apiKeyPresent: telemetry.apiKeyPresent,
          ...details,
        });
      }

      function setStatus(text) {
        state.statusBaseText = text;
        statusEl.textContent = text;
      }

      function isNearMessageBottom() {
        return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
      }

      function scrollMessagesToLatest() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function createMessageBlock(className, label, text) {
        const block = document.createElement("article");
        block.className = className;
        const strong = document.createElement("strong");
        strong.textContent = label;
        const body = document.createElement("div");
        body.textContent = text;
        block.append(strong, document.createTextNode("\n"), body);
        return { block, body };
      }

      function appendBlock(className, label, text) {
        const surface = createMessageBlock(className, label, text);
        messagesEl.append(surface.block);
        scrollMessagesToLatest();
        return surface.block;
      }

      function setPromptAuthRequired(required, message) {
        state.promptEnabled = !required;
        promptInputEl.disabled = required;
        submitButtonEl.disabled = required || Boolean(state.activeTurnId);
        promptInputEl.placeholder = required
          ? (message || "Provider credentials are required before prompts can run")
          : "Ask pi…";
        document.getElementById("auth-panel").classList.toggle("auth-required", required);
      }

      function modelCapabilities(model) {
        const capabilities = [];
        if (model.reasoning) capabilities.push("reasoning");
        if (model.toolCalling) capabilities.push("tools");
        if (model.supportsImages) capabilities.push("images");
        if (model.contextWindow) capabilities.push(`${model.contextWindow} ctx`);
        if (model.maxTokens) capabilities.push(`${model.maxTokens} max`);
        return capabilities.join(" · ") || "text";
      }

      function renderModelPanel(bridgeState) {
        const selection = bridgeState.modelSelection || {};
        const models = selection.availableModels || [];
        modelPanelStatusEl.textContent = `${models.length} models · active ${selection.activeProvider || bridgeState.provider}/${selection.activeModel || bridgeState.model}`;
        modelListEl.textContent = "";
        for (const model of models) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `panel-row${model.current ? " current" : ""}`;
          row.disabled = Boolean(state.activeTurnId) || !model.available;
          const title = document.createElement("strong");
          title.textContent = `${model.current ? "✓ " : ""}${model.displayName || model.model}`;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = `${model.provider} · ${model.model} · ${model.authStatusLabel || model.authStatus} · ${modelCapabilities(model)}`;
          row.append(title, meta);
          row.addEventListener("click", async () => {
            markTelemetry("model_panel_select", { provider: model.provider, valueLength: model.model.length });
            const result = await sendBridge("model_select", { provider: model.provider, model: model.model });
            if (result.status === "selected" || result.status === "auth_required") {
              await refreshStatePanels();
            }
            if (result.status === "auth_required") {
              setPromptAuthRequired(true, result.message);
            }
          });
          modelListEl.append(row);
        }
        markTelemetry("model_panel_rendered", {
          childCount: modelListEl.childElementCount,
          valueLength: models.length,
        });
      }

      function renderAuthPanel(bridgeState) {
        const auth = bridgeState.auth || {};
        authPanelStatusEl.textContent = `${auth.displayName || bridgeState.provider}: ${auth.statusLabel || auth.status || "unknown"}`;
        authStartButtonEl.disabled = !auth.actions?.startAuth;
        authSaveButtonEl.disabled = !auth.actions?.saveApiKey;
        authRemoveButtonEl.disabled = !auth.actions?.removeAuth;
        setPromptAuthRequired(Boolean(auth.required), "Provider credentials are required before prompts can run");
        markTelemetry("auth_panel_rendered", {
          valueLength: auth.status ? auth.status.length : 0,
          childCount: Number(Boolean(auth.actions?.saveApiKey)) + Number(Boolean(auth.actions?.removeAuth)),
        });
      }

      function sessionMatchesSearch(session) {
        const query = state.sessionUi.search.trim().toLowerCase();
        if (!query) return true;
        return [session.id, session.name, session.firstMessage, session.cwd, session.path]
          .filter(Boolean)
          .some((value) => String(value).toLowerCase().includes(query));
      }

      function renderSessionPanel(bridgeState) {
        const selection = bridgeState.sessionSelection || {};
        let sessions = [...(selection.sessions || [])];
        if (state.sessionUi.nameFilter === "named") {
          sessions = sessions.filter((session) => Boolean(session.name));
        }
        sessions = sessions.filter(sessionMatchesSearch);
        if (state.sessionUi.sort === "recent") {
          sessions.sort((a, b) => String(b.modified || "").localeCompare(String(a.modified || "")));
        } else if (state.sessionUi.sort === "relevance" && state.sessionUi.search) {
          sessions.sort((a, b) => Number(Boolean(b.name)) - Number(Boolean(a.name)));
        }
        sessionListEl.textContent = "";
        for (const session of sessions) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `panel-row${session.current ? " current" : ""}`;
          row.disabled = Boolean(state.activeTurnId) || session.current;
          const title = document.createElement("strong");
          title.textContent = `${session.current ? "✓ " : ""}${session.name || session.firstMessage || session.id}`;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = [
            session.messageCount === 1 ? "1 message" : `${session.messageCount || 0} messages`,
            session.modified,
            state.sessionUi.showPath ? session.path : session.cwd,
          ].filter(Boolean).join(" · ");
          row.append(title, meta);
          row.addEventListener("click", async () => {
            markTelemetry("session_panel_switch", { valueLength: session.path.length });
            await sendBridge("switch_session", { sessionPath: session.path });
            await refreshStatePanels();
            const transcript = await sendBridge("get_messages");
            renderMessages(transcript.messages || []);
          });
          sessionListEl.append(row);
        }
        sessionNewButtonEl.disabled = Boolean(state.activeTurnId) || selection.status !== "ready";
        markTelemetry("session_panel_rendered", {
          childCount: sessionListEl.childElementCount,
          valueLength: sessions.length,
        });
      }

      function settingMatchesSearch(row) {
        const query = state.settingsUi.search.trim().toLowerCase();
        if (!query) return true;
        return [row.label, row.description, row.value, row.id]
          .filter(Boolean)
          .some((value) => String(value).toLowerCase().includes(query));
      }

      function nextSettingValue(row) {
        if (Array.isArray(row.options) && row.options.length > 0) {
          const index = row.options.indexOf(row.value);
          return row.options[(index + 1) % row.options.length];
        }
        if (row.kind === "toggle") return row.value === "true" ? "false" : "true";
        return row.value;
      }

      function renderSettingsPanel(bridgeState) {
        const panel = bridgeState.settingsPanel || {};
        const rows = (panel.rows || []).filter(settingMatchesSearch);
        settingsPanelStatusEl.textContent = `${rows.length}/${(panel.rows || []).length} rows${panel.permissionRequired ? " · changes gated" : ""}`;
        settingsListEl.textContent = "";
        for (const row of rows) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "panel-row settings-row";
          button.disabled = Boolean(state.activeTurnId) || !row.editable || panel.permissionRequired;
          const title = document.createElement("strong");
          title.textContent = row.label;
          const value = document.createElement("code");
          value.textContent = row.value;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = row.description;
          button.append(title, value, meta);
          button.addEventListener("click", async () => {
            const nextValue = nextSettingValue(row);
            markTelemetry("settings_panel_set", { id: row.id, valueLength: nextValue.length });
            await sendBridge("settings_set", { id: row.id, value: nextValue });
            await refreshStatePanels();
          });
          settingsListEl.append(button);
        }
        markTelemetry("settings_panel_rendered", {
          childCount: settingsListEl.childElementCount,
          valueLength: rows.length,
          searchLength: state.settingsUi.search.length,
        });
      }

      function renderThinkingPanel(bridgeState) {
        const thinking = bridgeState.thinkingSelection || bridgeState.settingsPanel?.thinking || {};
        const levels = thinking.levels || [];
        thinkingPanelStatusEl.textContent = thinking.modelSupportsThinking
          ? `Current: ${thinking.current}`
          : "Current model does not support thinking beyond off";
        thinkingListEl.textContent = "";
        for (const level of levels) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `panel-row${level.active ? " current" : ""}${level.available ? "" : " disabled"}`;
          row.disabled = Boolean(state.activeTurnId) || !level.available;
          const title = document.createElement("strong");
          title.textContent = `${level.active ? "✓ " : ""}${level.name}`;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = level.available ? level.description : (level.unavailableReason || "Unavailable for this model");
          row.append(title, meta);
          row.addEventListener("click", async () => {
            markTelemetry("thinking_panel_select", { level: level.name });
            await sendBridge("thinking_set", { level: level.name });
            await refreshStatePanels();
          });
          thinkingListEl.append(row);
        }
        markTelemetry("thinking_panel_rendered", {
          childCount: thinkingListEl.childElementCount,
          valueLength: levels.length,
          modelSupportsThinking: Boolean(thinking.modelSupportsThinking),
        });
      }

      function applyThemeClass(themeName) {
        document.documentElement.dataset.piTheme = themeName || "dark";
        document.body.dataset.piTheme = themeName || "dark";
      }

      function renderThemePanel(bridgeState) {
        const theme = bridgeState.themeSelection || bridgeState.settingsPanel?.theme || {};
        const themes = theme.themes || [];
        themePanelStatusEl.textContent = `Active: ${theme.active || "dark"}`;
        applyThemeClass(theme.active || "dark");
        themeListEl.textContent = "";
        for (const item of themes) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `panel-row${item.active ? " current" : ""}`;
          row.disabled = Boolean(state.activeTurnId);
          const title = document.createElement("strong");
          title.textContent = `${item.active ? "✓ " : ""}${item.name}`;
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = item.active ? "active theme" : "available theme";
          row.append(title, meta);
          row.addEventListener("click", async () => {
            markTelemetry("theme_panel_select", { theme: item.name });
            await sendBridge("theme_select", { theme: item.name });
            await refreshStatePanels();
          });
          themeListEl.append(row);
        }
        markTelemetry("theme_panel_rendered", {
          childCount: themeListEl.childElementCount,
          activeTheme: theme.active || "dark",
        });
      }

      function scopedModelMatchesSearch(model) {
        const query = state.scopedUi.search.trim().toLowerCase();
        if (!query) return true;
        return [model.fullId, model.provider, model.model, model.displayName, model.authStatusLabel]
          .filter(Boolean)
          .some((value) => String(value).toLowerCase().includes(query));
      }

      function filteredScopedModels() {
        const scoped = state.bridgeState?.scopedModels || {};
        return (scoped.models || []).filter(scopedModelMatchesSearch);
      }

      function renderScopedModelsPanel(bridgeState) {
        const scoped = bridgeState.scopedModels || {};
        const models = (scoped.models || []).filter(scopedModelMatchesSearch);
        scopedPanelStatusEl.textContent = `${scoped.enabledCount || 0}/${scoped.totalCount || 0} enabled${scoped.dirty ? " · unsaved" : ""}`;
        scopedListEl.textContent = "";
        for (const model of models) {
          const row = document.createElement("div");
          row.className = `panel-row scoped-row${model.enabled ? " current" : ""}`;
          const title = document.createElement("strong");
          title.textContent = `${model.enabled ? "✓ " : "✗ "}${model.displayName || model.model}`;
          const providerButton = document.createElement("button");
          providerButton.type = "button";
          providerButton.textContent = model.provider;
          providerButton.disabled = Boolean(state.activeTurnId);
          providerButton.addEventListener("click", async () => {
            markTelemetry("scoped_models_provider_toggle", { provider: model.provider });
            await sendBridge("scoped_models_update", { action: "provider_toggle", provider: model.provider });
            await refreshStatePanels();
          });
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = `${model.fullId} · ${model.authStatusLabel || model.authStatus || ""}`;
          const controls = document.createElement("span");
          controls.className = "panel-controls";
          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.textContent = model.enabled ? "Disable" : "Enable";
          toggle.disabled = Boolean(state.activeTurnId);
          toggle.addEventListener("click", async () => {
            markTelemetry("scoped_models_toggle", { fullId: model.fullId });
            await sendBridge("scoped_models_update", { action: "toggle", fullId: model.fullId });
            await refreshStatePanels();
          });
          const up = document.createElement("button");
          up.type = "button";
          up.textContent = "↑";
          up.disabled = Boolean(state.activeTurnId);
          up.addEventListener("click", async () => {
            markTelemetry("scoped_models_reorder", { direction: "up", fullId: model.fullId });
            await sendBridge("scoped_models_update", { action: "reorder", fullId: model.fullId, direction: "up" });
            await refreshStatePanels();
          });
          const down = document.createElement("button");
          down.type = "button";
          down.textContent = "↓";
          down.disabled = Boolean(state.activeTurnId);
          down.addEventListener("click", async () => {
            markTelemetry("scoped_models_reorder", { direction: "down", fullId: model.fullId });
            await sendBridge("scoped_models_update", { action: "reorder", fullId: model.fullId, direction: "down" });
            await refreshStatePanels();
          });
          controls.append(toggle, up, down);
          row.append(title, providerButton, meta, controls);
          scopedListEl.append(row);
        }
        scopedEnableAllButtonEl.disabled = Boolean(state.activeTurnId);
        scopedClearAllButtonEl.disabled = Boolean(state.activeTurnId);
        scopedSaveButtonEl.disabled = Boolean(state.activeTurnId) || !scoped.dirty;
        markTelemetry("scoped_models_panel_rendered", {
          childCount: scopedListEl.childElementCount,
          valueLength: models.length,
          enabledCount: scoped.enabledCount || 0,
          dirty: Boolean(scoped.dirty),
          searchLength: state.scopedUi.search.length,
        });
      }

      async function refreshStatePanels() {
        const bridgeState = await sendBridge("get_state");
        state.bridgeState = bridgeState;
        telemetry.provider = bridgeState.provider || "unknown";
        telemetry.apiKeyPresent = Boolean(bridgeState.apiKeyPresent);
        const auth = bridgeState.auth || {};
        const authLabel = auth.statusLabel || auth.status || "unknown";
        setStatus(`provider: ${bridgeState.provider} · model: ${bridgeState.model} · session: ${bridgeState.sessionId} · auth: ${authLabel}`);
        renderModelPanel(bridgeState);
        renderAuthPanel(bridgeState);
        renderSessionPanel(bridgeState);
        renderSettingsPanel(bridgeState);
        renderThinkingPanel(bridgeState);
        renderThemePanel(bridgeState);
        renderScopedModelsPanel(bridgeState);
        return bridgeState;
      }

      function structuredKey(turnId, contentIndex, fallback) {
        return `${turnId}:${contentIndex ?? fallback}`;
      }

      function perTurnSurface(map, turnId) {
        let surfaces = map.get(turnId);
        if (!surfaces) {
          surfaces = new Map();
          map.set(turnId, surfaces);
        }
        return surfaces;
      }

      function jsonSummary(value) {
        if (value === undefined || value === null) return "";
        try {
          return JSON.stringify(value, null, 2);
        } catch (_) {
          return String(value);
        }
      }

      function contentBlockText(block) {
        if (!block || typeof block !== "object") return "";
        if (block.type === "text") return block.text || "";
        if (block.type === "thinking") return block.thinking || "";
        if (block.type === "image") return `[Image: ${block.mimeType || "image"}]`;
        if (block.type === "toolCall") return `${block.name || "tool"} ${jsonSummary(block.arguments)}`;
        return "";
      }

      function contentBlocksText(blocks, wantedType) {
        if (!Array.isArray(blocks)) return "";
        const parts = [];
        for (const block of blocks) {
          if (wantedType && block?.type !== wantedType) continue;
          const text = contentBlockText(block);
          if (text.length > 0) parts.push(text);
        }
        return parts.join("\n");
      }

      function createStructuredCard(className, kind, title, text = "") {
        const block = document.createElement("article");
        block.className = `event structured-card ${className}`;
        const header = document.createElement("div");
        header.className = "card-title";
        const kindEl = document.createElement("span");
        kindEl.className = "card-kind";
        kindEl.textContent = kind;
        const titleEl = document.createElement("span");
        titleEl.textContent = title;
        const body = document.createElement("pre");
        body.textContent = text;
        header.append(kindEl, titleEl);
        block.append(header, body);
        messagesEl.append(block);
        scrollMessagesToLatest();
        markTelemetry("structured_surface_rendered", {
          kind,
          title,
          terminalOutcome: kind === "terminal" ? title : "none",
          valueLength: text.length,
          childCount: messagesEl.childElementCount,
        });
        return { block, body, title: titleEl };
      }

      function createThinkingBlock(turnId, contentIndex) {
        const key = structuredKey(turnId, contentIndex, "thinking");
        const surfaces = perTurnSurface(state.thinkingByTurn, turnId);
        const existing = surfaces.get(key);
        if (existing) return existing;

        const block = document.createElement("article");
        block.className = "event structured-card thinking-card";
        const details = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = "Thinking";
        const body = document.createElement("pre");
        body.className = "thinking-body";
        details.append(summary, body);
        block.append(details);
        messagesEl.append(block);
        scrollMessagesToLatest();
        const surface = { block, details, summary, body, text: "" };
        surfaces.set(key, surface);
        markTelemetry("thinking_block_collapsed", {
          turnId,
          contentIndex: contentIndex ?? null,
          expanded: details.open,
          childCount: messagesEl.childElementCount,
        });
        details.addEventListener("toggle", () => {
          const answer = state.liveAssistantByTurn.get(turnId);
          markTelemetry("thinking_block_toggled", {
            turnId,
            contentIndex: contentIndex ?? null,
            expanded: details.open,
            answerTextLength: answer ? answer.text.length + answer.pendingText.length : 0,
          });
        });
        return surface;
      }

      function appendThinkingDelta(turnId, contentIndex, delta, frame) {
        const surface = createThinkingBlock(turnId, contentIndex);
        surface.text += delta || "";
        surface.body.textContent = surface.text;
        markTelemetry("thinking_delta_rendered", {
          turnId,
          sequence: frame.sequence,
          valueLength: (delta || "").length,
          visibleInAnswer: false,
        });
      }

      function createToolCallBlock(turnId, contentIndex, toolCall) {
        const key = structuredKey(turnId, contentIndex, toolCall?.id || "toolcall");
        const surfaces = perTurnSurface(state.toolCallByTurn, turnId);
        const existing = surfaces.get(key);
        if (existing) return existing;
        const title = toolCall?.name ? `${toolCall.name}` : "streaming tool call";
        const surface = createStructuredCard("tool-call-card", "tool call", title, "");
        surface.text = "";
        surfaces.set(key, surface);
        return surface;
      }

      function updateToolCallBlock(turnId, contentIndex, toolCall, delta, frame) {
        const surface = createToolCallBlock(turnId, contentIndex, toolCall);
        if (toolCall?.name) surface.title.textContent = toolCall.name;
        if (toolCall?.arguments) {
          surface.text = jsonSummary(toolCall.arguments);
        } else {
          surface.text = `${surface.text || ""}${delta || ""}`;
        }
        surface.body.textContent = surface.text;
        markTelemetry("tool_call_card_rendered", {
          turnId,
          sequence: frame.sequence,
          toolName: toolCall?.name || "unknown",
          valueLength: surface.text.length,
        });
      }

      function createToolResultBlock(toolName, result, isError, frame) {
        const text = result?.content ? contentBlocksText(result.content) : jsonSummary(result);
        const surface = createStructuredCard(
          `tool-result-card${isError ? " error" : ""}`,
          "tool result",
          toolName || "tool",
          text,
        );
        markTelemetry("tool_result_card_rendered", {
          turnId: frame.turnId,
          sequence: frame.sequence,
          toolName: toolName || "unknown",
          isError: Boolean(isError),
          valueLength: text.length,
        });
        return surface;
      }

      function createTerminalCard(frame, label, text) {
        const outcome = frame.terminalOutcome || label || "done";
        const className = outcome === "abort" || outcome === "window_closed"
          ? "terminal-card abort"
          : outcome === "success"
            ? "terminal-card"
            : "terminal-card error";
        return createStructuredCard(className, "terminal", outcome, text || outcome);
      }

      function renderMessages(messages) {
        messagesEl.textContent = "";
        state.liveAssistantByTurn.clear();
        state.thinkingByTurn.clear();
        state.toolCallByTurn.clear();
        for (const message of messages) {
          if (message.role === "assistant" && Array.isArray(message.content)) {
            const transcriptTurnId = `transcript-${message.timestamp || messagesEl.childElementCount}`;
            for (const block of message.content) {
              if (block.type === "thinking") {
                const thinking = createThinkingBlock(transcriptTurnId, block.contentIndex ?? "history");
                thinking.text = block.thinking || "";
                thinking.body.textContent = thinking.text;
              }
            }
            const answer = contentBlocksText(message.content, "text");
            if (answer.length > 0) appendBlock("message assistant", "assistant", answer);
            for (const block of message.content) {
              if (block.type === "toolCall") {
                updateToolCallBlock(transcriptTurnId, block.contentIndex ?? block.id, block, "", {
                  turnId: transcriptTurnId,
                  sequence: 0,
                });
              }
            }
          } else if (message.role === "toolResult") {
            createToolResultBlock(
              message.toolName || "tool",
              { content: message.content || [{ type: "text", text: message.text || "" }] },
              Boolean(message.isError),
              { turnId: "transcript", sequence: 0 },
            );
          } else {
            appendBlock(`message ${message.role}`, message.role, message.text || "");
          }
        }
        markTelemetry("transcript_render", {
          messageCount: messages.length,
          childCount: messagesEl.childElementCount,
        });
      }

      function setRunningState(running, details = {}) {
        formEl.dataset.running = running ? "true" : "false";
        submitButtonEl.disabled = running || !state.promptEnabled;
        abortButtonEl.disabled = !running;
        statusEl.textContent = running ? `${state.statusBaseText} · streaming` : state.statusBaseText;
        if (running) markTelemetry("controls_active", details);
      }

      function ensureLiveAssistant(turnId) {
        let surface = state.liveAssistantByTurn.get(turnId);
        if (surface) return surface;
        const created = createMessageBlock("message assistant streaming", "assistant", "");
        surface = {
          block: created.block,
          body: created.body,
          text: "",
          pendingText: "",
          flushScheduled: false,
          visibleDeltas: 0,
          initialChildCount: messagesEl.childElementCount,
        };
        state.liveAssistantByTurn.set(turnId, surface);
        messagesEl.append(created.block);
        scrollMessagesToLatest();
        markTelemetry("streaming_surface_created", {
          turnId,
          childCount: messagesEl.childElementCount,
        });
        return surface;
      }

      function recordVisibleAssistantDelta(turnId, frame, surface, appendedLength) {
        if (!state.firstDeltaSeenByTurn.has(turnId)) {
          state.firstDeltaSeenByTurn.add(turnId);
          const submitPerfMs = state.submitPerfByTurn.get(turnId);
          markTelemetry("first_assistant_delta", {
            turnId,
            sequence: frame.sequence,
            submitToFirstDeltaMs: submitPerfMs === undefined ? null : performance.now() - submitPerfMs,
          });
        }
        markTelemetry("visible_assistant_delta", {
          turnId,
          sequence: frame.sequence,
          valueLength: appendedLength,
          visibleDeltaIndex: surface.visibleDeltas,
          childCount: messagesEl.childElementCount,
          reusedSurface: messagesEl.childElementCount === surface.initialChildCount + 1,
        });
        if (surface.visibleDeltas > 1) {
          markTelemetry("streaming_surface_reused", {
            turnId,
            sequence: frame.sequence,
            childCount: messagesEl.childElementCount,
            visibleDeltaIndex: surface.visibleDeltas,
          });
        }
      }

      function flushAssistantSurface(turnId, frame) {
        const surface = state.liveAssistantByTurn.get(turnId);
        if (!surface || surface.pendingText.length === 0) return;
        const pendingText = surface.pendingText;
        surface.pendingText = "";
        const stickToBottom = isNearMessageBottom();
        surface.text += pendingText;
        surface.body.textContent = surface.text;
        surface.visibleDeltas += 1;
        surface.block.dataset.visibleDeltas = String(surface.visibleDeltas);
        if (stickToBottom) scrollMessagesToLatest();
        recordVisibleAssistantDelta(turnId, frame, surface, pendingText.length);
      }

      function scheduleAssistantFlush(turnId, frame, delta) {
        const surface = ensureLiveAssistant(turnId);
        surface.pendingText += delta;
        if (surface.flushScheduled) return;
        surface.flushScheduled = true;
        requestAnimationFrame(() => {
          surface.flushScheduled = false;
          flushAssistantSurface(turnId, frame);
        });
      }

      function startActiveFrameMonitor(turnId) {
        state.activeFrameMonitor = {
          turnId,
          running: true,
          lastPerfMs: performance.now(),
          maxGapMs: 0,
        };
        const tick = (now) => {
          const monitor = state.activeFrameMonitor;
          if (!monitor || !monitor.running || monitor.turnId !== turnId) return;
          const gap = now - monitor.lastPerfMs;
          monitor.lastPerfMs = now;
          if (gap > monitor.maxGapMs) monitor.maxGapMs = gap;
          if (gap > 100) {
            markTelemetry("active_ui_stall", {
              turnId,
              maxActiveFrameGapMs: gap,
            });
          }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      function stopActiveFrameMonitor(turnId, outcome) {
        const monitor = state.activeFrameMonitor;
        if (!monitor || monitor.turnId !== turnId) return;
        monitor.running = false;
        markTelemetry("active_stall_summary", {
          turnId,
          terminalOutcome: outcome || "done",
          maxActiveFrameGapMs: monitor.maxGapMs,
          stallOver100: monitor.maxGapMs > 100,
        });
        state.activeFrameMonitor = null;
      }

      function isTranscriptLifecycleEvent(type) {
        return type === "agent_start" ||
          type === "turn_start" ||
          type === "turn_end" ||
          type === "message_start" ||
          type === "message_end" ||
          type === "before_provider_request" ||
          type === "after_provider_response";
      }

      function renderAssistantEvent(frame, assistant) {
        const type = assistant.type;
        switch (type) {
          case "start":
          case "text_start":
            ensureLiveAssistant(frame.turnId);
            return true;
          case "text_delta":
            if (state.locallyAbortedTurns.has(frame.turnId)) {
              markTelemetry("late_assistant_delta_suppressed", {
                turnId: frame.turnId,
                sequence: frame.sequence,
                valueLength: (assistant.delta || "").length,
              });
              return true;
            }
            scheduleAssistantFlush(frame.turnId, frame, assistant.delta || "");
            markTelemetry("answer_text_delta", {
              turnId: frame.turnId,
              sequence: frame.sequence,
              valueLength: (assistant.delta || "").length,
            });
            return true;
          case "text_end":
            flushAssistantSurface(frame.turnId, frame);
            return true;
          case "thinking_start":
            createThinkingBlock(frame.turnId, assistant.contentIndex);
            return true;
          case "thinking_delta":
            appendThinkingDelta(frame.turnId, assistant.contentIndex, assistant.delta || "", frame);
            return true;
          case "thinking_end": {
            const surface = createThinkingBlock(frame.turnId, assistant.contentIndex);
            if (assistant.content && surface.text.length === 0) {
              surface.text = assistant.content;
              surface.body.textContent = surface.text;
            }
            return true;
          }
          case "toolcall_start":
            createToolCallBlock(frame.turnId, assistant.contentIndex, assistant.toolCall);
            return true;
          case "toolcall_delta":
            updateToolCallBlock(frame.turnId, assistant.contentIndex, assistant.toolCall, assistant.delta || "", frame);
            return true;
          case "toolcall_end":
            updateToolCallBlock(frame.turnId, assistant.contentIndex, assistant.toolCall, "", frame);
            return true;
          case "error": {
            const reason = assistant.reason || "provider error";
            const text = assistant.error?.errorMessage || assistant.error?.text || reason;
            createStructuredCard("error-card", "error", reason, text);
            return true;
          }
          case "done":
            flushAssistantSurface(frame.turnId, frame);
            markTelemetry("assistant_done_structured", {
              turnId: frame.turnId,
              sequence: frame.sequence,
            });
            return true;
          default:
            return false;
        }
      }

      function renderToolExecutionEvent(frame, event) {
        const toolName = event.toolName || "tool";
        if (frame.type === "tool_execution_start") {
          createStructuredCard("tool-call-card", "tool call", toolName, jsonSummary(event.args));
          return true;
        }
        if (frame.type === "tool_execution_update") {
          createToolResultBlock(toolName, event.partialResult, false, frame);
          return true;
        }
        if (frame.type === "tool_execution_end") {
          createToolResultBlock(toolName, event.result, Boolean(event.isError), frame);
          return true;
        }
        return false;
      }

      function renderEvent(frame) {
        if (!frame || !frame.turnId) return;
        if (state.activeTurnId && frame.turnId !== state.activeTurnId) return;
        const lastSequence = state.lastSequenceByTurn.get(frame.turnId) || 0;
        if (frame.sequence <= lastSequence) return;
        if (frame.sequence !== lastSequence + 1) {
          appendBlock("event", "event gap", `${frame.turnId} expected ${lastSequence + 1} got ${frame.sequence}`);
        }
        state.lastSequenceByTurn.set(frame.turnId, frame.sequence);
        const event = frame.event || {};
        const assistant = event.assistantMessageEvent || {};
        if (assistant.type) {
          if (!renderAssistantEvent(frame, assistant)) {
            appendBlock("event", `${frame.sequence} assistant`, assistant.type);
          }
        } else if (frame.terminal) {
          flushAssistantSurface(frame.turnId, frame);
          const surface = state.liveAssistantByTurn.get(frame.turnId);
          if (surface) surface.block.classList.remove("streaming");
          const terminalText = frame.error
            ? `${frame.terminalOutcome || "done"}: ${frame.error}`
            : frame.terminalOutcome || "done";
          if (frame.terminalOutcome && frame.terminalOutcome !== "success") {
            createTerminalCard(frame, `${frame.sequence} terminal`, terminalText);
          }
          stopActiveFrameMonitor(frame.turnId, frame.terminalOutcome || "done");
          if (frame.terminalOutcome === "provider_error") {
            promptInputEl.disabled = false;
            setRunningState(false, { turnId: frame.turnId });
            markTelemetry("provider_error_retry_ready", {
              turnId: frame.turnId,
              errorToRetryReadyMs: 0,
            });
          }
        } else if (isTranscriptLifecycleEvent(frame.type)) {
          markTelemetry("lifecycle_event_coalesced", {
            turnId: frame.turnId,
            sequence: frame.sequence,
            childCount: messagesEl.childElementCount,
          });
        } else if (renderToolExecutionEvent(frame, event)) {
          // Rendered as a structured tool card.
        } else {
          appendBlock("event", `${frame.sequence} ${frame.type}`, event.type || "");
        }
        if (frame.terminal) {
          state.activeTurnId = null;
          state.submitPerfByTurn.delete(frame.turnId);
          setRunningState(false, { turnId: frame.turnId });
        }
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function nextAnimationFrame() {
        return new Promise((resolve) => requestAnimationFrame(resolve));
      }

      function isAssistantDeltaFrame(frame) {
        return frame?.event?.assistantMessageEvent?.type === "text_delta";
      }

      async function pollTurnEvents(turnId) {
        let idlePolls = 0;
        while (state.activeTurnId === turnId) {
          const lastSequence = state.lastSequenceByTurn.get(turnId) || 0;
          const result = await sendBridge("get_events", { turnId, afterSequence: lastSequence });
          const frames = result.events || [];
          let deltaFramesSinceYield = 0;
          for (const frame of frames) {
            renderEvent(frame);
            if (isAssistantDeltaFrame(frame)) {
              deltaFramesSinceYield += 1;
              if (deltaFramesSinceYield >= 8) {
                deltaFramesSinceYield = 0;
                await nextAnimationFrame();
              }
            }
          }
          if (result.terminal || frames.some((frame) => frame.terminal)) break;
          idlePolls = frames.length === 0 ? idlePolls + 1 : 0;
          await delay(idlePolls > 2 ? 50 : 25);
        }
      }

      function sendBridge(command, payload = undefined) {
        const id = `webview-${++state.requestId}`;
        const request = { id, command };
        if (payload !== undefined) request.payload = payload;
        return new Promise((resolve, reject) => {
          state.pending.set(id, { resolve, reject });
          if (window.webkit?.messageHandlers?.pi) {
            postNativeMessage(request);
          } else {
            state.pending.delete(id);
            reject(new Error("Zig bridge is unavailable"));
          }
        });
      }

      window.piBridgeReceive = (response) => {
        const pending = state.pending.get(response?.id);
        if (!pending) return;
        state.pending.delete(response.id);
        if (response.ok) {
          pending.resolve(response.result);
        } else {
          pending.reject(new Error(response.error?.message || response.error?.code || "Bridge error"));
        }
      };

      async function hydrate() {
        const bridgeState = await refreshStatePanels();
        const auth = bridgeState.auth || {};
        if (bridgeState.initialInput) {
          initialInputEl.hidden = false;
          initialInputEl.textContent = `prepared input: ${bridgeState.initialInput.prompt || ""}\nmessages: ${bridgeState.initialInput.messages.length}\nimages: ${bridgeState.initialInput.imagesCount}`;
          if (bridgeState.initialInput.prompt && !auth.required) promptInputEl.value = bridgeState.initialInput.prompt;
        }
        const transcript = await sendBridge("get_messages");
        renderMessages(transcript.messages || []);
        telemetry.hydratedPerfMs = performance.now();
        markTelemetry("hydrated", {
          authRequired: Boolean(auth.required),
          messageCount: (transcript.messages || []).length,
        });
        ensurePromptInteractive("hydrated");
      }

      function ensurePromptInteractive(reason) {
        if (promptInputEl.disabled) return;
        requestAnimationFrame(() => {
          promptInputEl.focus();
          if (nativeBootstrap.readyInputSmoke && !telemetry.typedInputSent) {
            const smokeText = nativeBootstrap.smokeInputText || "webview ready input smoke";
            promptInputEl.value = smokeText;
            promptInputEl.dispatchEvent(new Event("input", { bubbles: true }));
          }
          if (nativeBootstrap.autoSubmitPrompt && !telemetry.autoSubmitSent) {
            telemetry.autoSubmitSent = true;
            promptInputEl.value = nativeBootstrap.autoSubmitPrompt;
            promptInputEl.dispatchEvent(new Event("input", { bubbles: true }));
            markTelemetry("auto_submit_scheduled", { valueLength: promptInputEl.value.length });
            requestAnimationFrame(() => formEl.requestSubmit());
          }
          markTelemetry("input_ready_check", {
            reason,
            activeElement: document.activeElement === promptInputEl ? "prompt" : "other",
            valueLength: promptInputEl.value.length,
          });
        });
      }

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = promptInputEl.value;
        if (!text.trim() || state.activeTurnId) return;
        const submitPerfMs = performance.now();
        markTelemetry("submit_action", { valueLength: text.length });
        submitButtonEl.disabled = true;
        try {
          appendBlock("message user", "user", text);
          markTelemetry("submitted_user_message", {
            submitToVisibleMs: performance.now() - submitPerfMs,
            valueLength: text.length,
          });
          const result = await sendBridge("prompt", { text });
          state.activeTurnId = result.turnId;
          state.lastSequenceByTurn.set(result.turnId, 0);
          state.submitPerfByTurn.set(result.turnId, submitPerfMs);
          ensureLiveAssistant(result.turnId);
          setRunningState(true, {
            turnId: result.turnId,
            submitToRunningMs: performance.now() - submitPerfMs,
          });
          startActiveFrameMonitor(result.turnId);
          markTelemetry("running_state", {
            turnId: result.turnId,
            submitToRunningMs: performance.now() - submitPerfMs,
          });
          if (nativeBootstrap.autoAbortMs > 0) {
            const abortDelayMs = Number(nativeBootstrap.autoAbortMs);
            setTimeout(() => {
              if (state.activeTurnId === result.turnId && !abortButtonEl.disabled) {
                markTelemetry("auto_abort_scheduled", {
                  turnId: result.turnId,
                  valueLength: abortDelayMs,
                });
                abortButtonEl.click();
              }
            }, abortDelayMs);
          }
          await pollTurnEvents(result.turnId);
          const terminalPerfMs = performance.now();
          markTelemetry("terminal_state", {
            turnId: result.turnId,
            submitToTerminalMs: terminalPerfMs - submitPerfMs,
          });
          markTelemetry("transcript_refresh_skipped", {
            turnId: result.turnId,
            childCount: messagesEl.childElementCount,
          });
          promptInputEl.value = "";
        } catch (error) {
          createStructuredCard("terminal-card error", "terminal", "error", String(error.message || error));
        } finally {
          state.activeTurnId = null;
          promptInputEl.disabled = false;
          setRunningState(false);
        }
      });

      abortButtonEl.addEventListener("click", async () => {
        const abortPerfMs = performance.now();
        try {
          const turnId = state.activeTurnId;
          markTelemetry("abort_action", { turnId: turnId || "none" });
          if (turnId) {
            state.locallyAbortedTurns.add(turnId);
            statusEl.textContent = `${state.statusBaseText} · aborting`;
            markTelemetry("abort_visible_state", {
              turnId,
              abortToVisibleMs: performance.now() - abortPerfMs,
            });
          }
          const result = await sendBridge("abort");
          createStructuredCard("terminal-card abort", "terminal", "abort", result.status);
          markTelemetry("abort_response", {
            turnId: turnId || "none",
            abortToVisibleMs: performance.now() - abortPerfMs,
          });
        } catch (error) {
          createStructuredCard("terminal-card error", "terminal", "abort error", String(error.message || error));
        }
      });

      authStartButtonEl.addEventListener("click", async () => {
        const result = await sendBridge("start_auth", { provider: state.bridgeState?.provider || telemetry.provider });
        authPanelStatusEl.textContent = result.message || "Authentication flow ready";
        markTelemetry("auth_panel_start", { valueLength: (result.authType || "").length });
      });

      authSaveButtonEl.addEventListener("click", async () => {
        const apiKey = authApiKeyInputEl.value;
        if (!apiKey.trim()) return;
        const provider = state.bridgeState?.provider || telemetry.provider;
        const result = await sendBridge("save_api_key", { provider, apiKey });
        authApiKeyInputEl.value = "";
        authPanelStatusEl.textContent = `${provider}: ${result.status}`;
        markTelemetry("auth_panel_save", { valueLength: 0 });
        await refreshStatePanels();
      });

      authRemoveButtonEl.addEventListener("click", async () => {
        const provider = state.bridgeState?.provider || telemetry.provider;
        const result = await sendBridge("remove_auth", { provider });
        authPanelStatusEl.textContent = `${provider}: ${result.status}`;
        markTelemetry("auth_panel_remove", { valueLength: Number(Boolean(result.removed)) });
        await refreshStatePanels();
      });

      sessionScopeSelectEl.addEventListener("change", () => {
        state.sessionUi.scope = sessionScopeSelectEl.value;
        renderSessionPanel(state.bridgeState || {});
      });
      sessionSortSelectEl.addEventListener("change", () => {
        state.sessionUi.sort = sessionSortSelectEl.value;
        renderSessionPanel(state.bridgeState || {});
      });
      sessionNameFilterSelectEl.addEventListener("change", () => {
        state.sessionUi.nameFilter = sessionNameFilterSelectEl.value;
        renderSessionPanel(state.bridgeState || {});
      });
      sessionPathToggleEl.addEventListener("change", () => {
        state.sessionUi.showPath = sessionPathToggleEl.checked;
        renderSessionPanel(state.bridgeState || {});
      });
      sessionSearchInputEl.addEventListener("input", () => {
        state.sessionUi.search = sessionSearchInputEl.value;
        renderSessionPanel(state.bridgeState || {});
      });
      sessionNewButtonEl.addEventListener("click", async () => {
        markTelemetry("session_panel_new", {});
        await sendBridge("new_session", {});
        await refreshStatePanels();
        const transcript = await sendBridge("get_messages");
        renderMessages(transcript.messages || []);
      });

      settingsSearchInputEl.addEventListener("input", () => {
        state.settingsUi.search = settingsSearchInputEl.value;
        renderSettingsPanel(state.bridgeState || {});
      });

      scopedSearchInputEl.addEventListener("input", () => {
        state.scopedUi.search = scopedSearchInputEl.value;
        renderScopedModelsPanel(state.bridgeState || {});
      });

      scopedEnableAllButtonEl.addEventListener("click", async () => {
        const targets = filteredScopedModels().map((model) => model.fullId);
        markTelemetry("scoped_models_enable_all", { valueLength: targets.length });
        await sendBridge("scoped_models_update", { action: "enable_all", targets });
        await refreshStatePanels();
      });

      scopedClearAllButtonEl.addEventListener("click", async () => {
        const targets = filteredScopedModels().map((model) => model.fullId);
        markTelemetry("scoped_models_clear_all", { valueLength: targets.length });
        await sendBridge("scoped_models_update", { action: "clear_all", targets });
        await refreshStatePanels();
      });

      scopedSaveButtonEl.addEventListener("click", async () => {
        markTelemetry("scoped_models_save", {});
        await sendBridge("scoped_models_save");
        await refreshStatePanels();
      });

      promptInputEl.addEventListener("focus", () => {
        if (telemetry.inputFocusSent) return;
        telemetry.inputFocusSent = true;
        const perfMs = performance.now();
        markTelemetry("input_focus", {
          readyToFocusMs: telemetry.readyPerfMs === null ? null : perfMs - telemetry.readyPerfMs,
          hydratedToFocusMs: telemetry.hydratedPerfMs === null ? null : perfMs - telemetry.hydratedPerfMs,
        });
      });

      promptInputEl.addEventListener("input", () => {
        if (telemetry.typedInputSent || promptInputEl.value.length === 0) return;
        telemetry.typedInputSent = true;
        const perfMs = performance.now();
        markTelemetry("typed_input", {
          readyToTypeMs: telemetry.readyPerfMs === null ? null : perfMs - telemetry.readyPerfMs,
          hydratedToTypeMs: telemetry.hydratedPerfMs === null ? null : perfMs - telemetry.hydratedPerfMs,
          valueLength: promptInputEl.value.length,
        });
      });

      window.addEventListener("DOMContentLoaded", () => {
        window.piWebViewReady = true;
        telemetry.readyPerfMs = performance.now();
        markTelemetry("ready", { surface: "dom_content_loaded" });
        setStatus("bridge: ready");
        if (window.webkit?.messageHandlers?.pi) {
          postNativeMessage({
            type: "frontend_ready",
          });
          markTelemetry("bridge_ready", { bridgeAvailable: true });
        } else {
          markTelemetry("bridge_ready", { bridgeAvailable: false });
        }
        hydrate().catch((error) => {
          setStatus(`bridge error: ${error.message || error}`);
        });
      });
      markTelemetry("launch", {
        nativeLaunchMonotonicMs: nativeBootstrap.launchMonotonicMs || null,
      });
    </script>
  </body>
</html>
