name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev.2261+d6b3dd25a
      - run: zig build test

  test-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev.2261+d6b3dd25a
      - run: cd ai && zig build test

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev.2261+d6b3dd25a
      - run: cd agent && zig build test
