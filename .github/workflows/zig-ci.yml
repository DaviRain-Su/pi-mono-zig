name: Zig CI

on:
  push:
    branches: [main, zig-implementation]
    paths:
      - "zig/**"
      - ".github/workflows/zig-ci.yml"
  pull_request:
    branches: [main, zig-implementation]
    paths:
      - "zig/**"
      - ".github/workflows/zig-ci.yml"
  workflow_dispatch:

concurrency:
  group: zig-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # ubuntu-latest currently SIGSEGVs in `zig build-exe pi` with Zig 0.16.0
    # due to upstream bug https://github.com/ziglang/zig/issues/26028.
    # Keep Linux in the matrix for setup/build-graph/tool smoke coverage, but
    # skip the Zig build/test steps there until a stable Zig release fixes it.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: zig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        working-directory: .
        run: npm ci

      # mlugg/setup-zig@v1 still uses the pre-0.16 tarball naming
      # (zig-<os>-<arch>-<ver>) and 404s on 0.16.0 which switched to
      # zig-<arch>-<os>-<ver>. Install Zig directly from ziglang.org.
      - name: Setup Zig 0.16.0
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.16.0
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   ARCH=x86_64-linux ;;
            Linux-ARM64) ARCH=aarch64-linux ;;
            macOS-X64)   ARCH=x86_64-macos ;;
            macOS-ARM64) ARCH=aarch64-macos ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1 ;;
          esac
          TARBALL="zig-${ARCH}-${ZIG_VERSION}.tar.xz"
          URL="https://ziglang.org/download/${ZIG_VERSION}/${TARBALL}"
          echo "Downloading ${URL}"
          curl -fsSL --retry 3 --retry-delay 5 -o "${TARBALL}" "${URL}"
          mkdir -p "${HOME}/.zig"
          tar -xJf "${TARBALL}" -C "${HOME}/.zig" --strip-components=1
          rm -f "${TARBALL}"
          echo "${HOME}/.zig" >> "${GITHUB_PATH}"
          "${HOME}/.zig/zig" version

      - name: Install system tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          # Debian/Ubuntu ships fd as fdfind; symlink so build.zig finds `fd`
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install system tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep fd

      - name: Verify external tools
        run: |
          rg --version
          fd --version
          zig version

      - name: Linux Zig smoke
        if: runner.os == 'Linux'
        run: |
          zig env
          zig build check-external-tools --summary all
          echo "Skipping Linux zig build/test because Zig 0.16.0 SIGSEGVs in build-exe on ubuntu-latest."
          echo "Re-enable after upgrading to a stable Zig release with ziglang/zig#26028 fixed."

      - name: Build
        if: runner.os != 'Linux'
        run: zig build

      - name: Test
        if: runner.os != 'Linux'
        run: zig build test
